<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <title>Orange County</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
        }

        * {
            box-sizing: border-box;
        }

        :root {
            --navy: #17213c;
            --text: #241b15;
        }


        .bg {
            font-family: "Inter", Arial, Helvetica, sans-serif;
            color: var(--text);
            background-image: url("orange-county-2.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .landing-page {
            min-height: 100vh;
            min-height: 100svh;

            padding: 32px 20px;
        }

        .logo-placeholder {
            width: clamp(150px, 20vw, 230px);
            height: clamp(78px, 10vw, 120px);
            border: 2px dashed currentColor;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.2);
        }

        .logo-wrapper {
            max-width: 300px;
            height: auto;
        }

        .poll-card {
            padding: clamp(22px, 3vw, 30px) clamp(22px, 5vw, 52px);
            border-radius: 18px;
            font-size: clamp(18px, 3vw, 34px);
            font-weight: 900;
            letter-spacing: 0.035em;
            text-align: center;
            color: white;
            background: #ee9436;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }



        .poll-card:hover {
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.15);
        }

        .disclaimer {
            display: inline-block;
            background: white;
            border: 2px solid var(--text);
            padding: 12px 18px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
        }

        .uppercase {
            text-transform: uppercase;
        }

        .underline {
            text-decoration: underline;
        }

        @media screen and (max-width: 550px) {
            .bg {
                background-position: 28% 50%;
            }

            .disclaimer {
                font-size: 10px;
            }
        }
    </style>
</head>

<body class="bg">
    <main class="landing-page d-flex flex-column">
        <div class="container flex-grow-1 d-flex flex-column">

            <div class="row justify-content-center">
                <div class="col-auto">
                    <div class="d-flex align-items-center justify-content-center">
                        <div class="logo-wrapper">
                            <img class="img-fluid" src="logo.png">
                        </div>
                    </div>
                </div>
            </div>

            <div class="row justify-content-center align-items-center flex-grow-1">
                <div class="col-auto d-flex flex-column">
                    <a class="poll-card d-inline-flex flex-column align-items-center justify-content-center"
                        href="https://ocvote.gov" target="_blank" rel="noopener">
                        <p class="uppercase mb-1">Find Your Polling Place</p>
                        <p class="underline mb-0">https://ocvote.gov</p>
                    </a>
                </div>
            </div>

            <div class="row justify-content-center">
                <div class="col-auto">
                    <div class="disclaimer">
                        <a href="https://takecaliforniabackvictoryfund.com">Paid for by Take California Back Victory
                            Fund
                            (takecaliforniabackvictoryfund.com)<br>
                            and not authorized by any candidate or candidate’s committee</a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
